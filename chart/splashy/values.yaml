replicaCount: 1

image:
  repository: ghcr.io/nousefreak/splashy
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: splashy.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

# Custom links.yaml content.
# Set this to override the default links bundled in the image.
links: |
  title: Splashy

  categories:
    - name: Work
      links:
        - title: Gmail
          url: https://mail.google.com
        - title: Google Calendar
          url: https://calendar.google.com
        - title: GitHub
          url: https://github.com

    - name: Dev
      links:
        - title: Stack Overflow
          url: https://stackoverflow.com
        - title: MDN Web Docs
          url: https://developer.mozilla.org

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splashy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: arial, sans-serif;
      background: #fff;
      color: #202124;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .logo {
      margin-top: 20vh;
      font-size: 92px;
      font-weight: 400;
      letter-spacing: -2px;
      margin-bottom: 28px;
      user-select: none;
    }

    .logo img {
      max-height: 92px;
      width: auto;
    }

    .search-wrapper {
      position: relative;
      width: 100%;
      max-width: 584px;
    }

    .search-box {
      display: flex;
      align-items: center;
      width: 100%;
      height: 44px;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      padding: 0 16px;
      transition: box-shadow 0.2s;
    }

    .search-box:hover,
    .search-box:focus-within {
      box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
      border-color: rgba(223, 225, 229, 0);
    }

    .search-box:focus-within {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }

    .search-box.no-suggestions:focus-within {
      border-radius: 24px;
    }

    .search-icon {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      flex-shrink: 0;
      color: #9aa0a6;
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      color: #202124;
      background: transparent;
    }

    .suggestions {
      display: none;
      position: absolute;
      top: 43px;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid rgba(223, 225, 229, 0);
      border-top: 1px solid #e8eaed;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      box-shadow: 0 4px 6px rgba(32, 33, 36, 0.28);
      padding: 4px 0 8px;
      z-index: 100;
      max-height: 360px;
      overflow-y: auto;
    }

    .suggestions.visible {
      display: block;
    }

    .suggestion-item {
      display: flex;
      align-items: center;
      padding: 6px 16px;
      cursor: pointer;
      text-decoration: none;
      color: #202124;
      font-size: 14px;
    }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: #f1f3f4;
    }

    .suggestion-item .icon {
      width: 16px;
      height: 16px;
      margin-right: 12px;
      flex-shrink: 0;
      color: #70757a;
    }

    .suggestion-item .title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .suggestion-item .category {
      font-size: 12px;
      color: #70757a;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .suggestion-item .url-hint {
      font-size: 12px;
      color: #70757a;
      margin-left: 8px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .search-hint {
      display: flex;
      align-items: center;
      padding: 6px 16px;
      font-size: 14px;
      color: #70757a;
      border-bottom: 1px solid #e8eaed;
      margin-bottom: 4px;
    }

    .search-hint .icon {
      width: 16px;
      height: 16px;
      margin-right: 12px;
      flex-shrink: 0;
      color: #4285f4;
    }

    .search-hint strong {
      color: #202124;
      font-weight: 400;
    }

    .link-grid {
      margin-top: 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      max-width: 700px;
      padding: 0 16px;
    }

    .link-category {
      min-width: 140px;
    }

    .link-category h3 {
      font-size: 12px;
      font-weight: 700;
      color: #70757a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .link-category a {
      display: block;
      font-size: 14px;
      color: #1a0dab;
      text-decoration: none;
      padding: 3px 0;
    }

    .link-category a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: auto;
      padding: 16px;
      font-size: 13px;
      color: #70757a;
    }

    /* Settings cog */
    .settings-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: none;
      background: none;
      cursor: pointer;
      color: #70757a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .settings-btn:hover {
      background: #f1f3f4;
    }

    .settings-btn svg {
      width: 22px;
      height: 22px;
    }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      margin: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #202124;
    }

    .modal p {
      font-size: 13px;
      color: #70757a;
      margin-bottom: 16px;
    }

    .modal-categories {
      list-style: none;
    }

    .modal-categories li {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #e8eaed;
    }

    .modal-categories li:last-child {
      border-bottom: none;
    }

    .modal-categories label {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-size: 14px;
      color: #202124;
      width: 100%;
    }

    .modal-categories input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4285f4;
      cursor: pointer;
      flex-shrink: 0;
    }

    .modal-close {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #4285f4;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .modal-close:hover {
      background: #3367d6;
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body {
        background: #202124;
        color: #e8eaed;
      }

      .search-box {
        background: #303134;
        border-color: #5f6368;
      }

      .search-box:hover,
      .search-box:focus-within {
        background: #303134;
        border-color: transparent;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
      }

      .search-icon {
        color: #9aa0a6;
      }

      .search-input {
        color: #e8eaed;
      }

      .suggestions {
        background: #303134;
        border-top-color: #5f6368;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
      }

      .suggestion-item {
        color: #e8eaed;
      }

      .suggestion-item:hover,
      .suggestion-item.active {
        background: #3c4043;
      }

      .suggestion-item .icon {
        color: #9aa0a6;
      }

      .suggestion-item .category,
      .suggestion-item .url-hint {
        color: #9aa0a6;
      }

      .search-hint {
        color: #9aa0a6;
        border-bottom-color: #5f6368;
      }

      .search-hint strong {
        color: #e8eaed;
      }

      .link-category h3 {
        color: #9aa0a6;
      }

      .link-category a {
        color: #8ab4f8;
      }

      .footer {
        color: #9aa0a6;
      }

      .settings-btn {
        color: #9aa0a6;
      }

      .settings-btn:hover {
        background: #3c4043;
      }

      .modal {
        background: #303134;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      }

      .modal h2 {
        color: #e8eaed;
      }

      .modal p {
        color: #9aa0a6;
      }

      .modal-categories li {
        border-bottom-color: #5f6368;
      }

      .modal-categories label {
        color: #e8eaed;
      }
    }
  </style>
</head>
<body>
  <button class="settings-btn" id="settingsBtn" title="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>
  </button>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Settings</h2>
      <p>Show or hide link categories.</p>
      <ul class="modal-categories" id="modalCategories"></ul>
      <button class="modal-close" id="modalClose">Done</button>
    </div>
  </div>

  <div class="logo" id="logo"></div>

  <div class="search-wrapper">
    <div class="search-box no-suggestions" id="searchBox">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        class="search-input"
        id="searchInput"
        type="text"
        autocomplete="off"
        autofocus
        placeholder=""
      >
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="link-grid" id="linkGrid"></div>

  <div class="footer">Splashy &mdash; your start page</div>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script>
    let allLinks = [];
    let allCategories = [];
    let hiddenCategories = JSON.parse(localStorage.getItem('splashy-hidden-categories') || '[]');
    let activeIndex = -1;
    let currentSuggestions = [];

    function saveHiddenCategories() {
      localStorage.setItem('splashy-hidden-categories', JSON.stringify(hiddenCategories));
    }

    function isCategoryVisible(name) {
      return !hiddenCategories.includes(name);
    }

    const logoColors = ['#4285f4', '#ea4335', '#fbbc05', '#4285f4', '#34a853', '#ea4335'];

    function renderLogo(title, image) {
      const logo = document.getElementById('logo');
      logo.innerHTML = '';
      if (image) {
        const img = document.createElement('img');
        img.src = image;
        img.alt = title;
        logo.appendChild(img);
      } else {
        [...title].forEach((char, i) => {
          const span = document.createElement('span');
          span.textContent = char;
          span.style.color = logoColors[i % logoColors.length];
          logo.appendChild(span);
        });
      }
    }

    async function loadLinks() {
      try {
        const resp = await fetch('links.yaml');
        const text = await resp.text();
        const data = jsyaml.load(text);
        if (!data || !data.categories) return;

        const title = data.title || 'Splashy';
        renderLogo(title, data.image);
        document.title = title;

        allCategories = data.categories.map(c => c.name);

        data.categories.forEach(cat => {
          (cat.links || []).forEach(link => {
            allLinks.push({ title: link.title, url: link.url, category: cat.name });
          });
        });

        renderGrid();
        renderSettingsModal();
      } catch (err) {
        console.error('Failed to load links.yaml:', err);
      }
    }

    function renderGrid() {
      const grid = document.getElementById('linkGrid');
      grid.innerHTML = '';

      const grouped = {};
      allLinks.forEach(link => {
        if (!isCategoryVisible(link.category)) return;
        if (!grouped[link.category]) grouped[link.category] = [];
        grouped[link.category].push(link);
      });

      Object.entries(grouped).forEach(([catName, links]) => {
        const section = document.createElement('div');
        section.className = 'link-category';
        const heading = document.createElement('h3');
        heading.textContent = catName;
        section.appendChild(heading);

        links.forEach(link => {
          const a = document.createElement('a');
          a.href = link.url;
          a.textContent = link.title;
          a.target = '_self';
          section.appendChild(a);
        });

        grid.appendChild(section);
      });
    }

    function renderSettingsModal() {
      const list = document.getElementById('modalCategories');
      list.innerHTML = '';

      allCategories.forEach(name => {
        const li = document.createElement('li');
        const label = document.createElement('label');
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = isCategoryVisible(name);
        checkbox.addEventListener('change', () => {
          if (checkbox.checked) {
            hiddenCategories = hiddenCategories.filter(c => c !== name);
          } else {
            hiddenCategories.push(name);
          }
          saveHiddenCategories();
          renderGrid();
        });
        label.appendChild(checkbox);
        label.appendChild(document.createTextNode(name));
        li.appendChild(label);
        list.appendChild(li);
      });
    }

    function filterLinks(query) {
      if (!query) return [];
      const q = query.toLowerCase();
      return allLinks.filter(l =>
        isCategoryVisible(l.category) && (
          l.title.toLowerCase().includes(q) ||
          l.url.toLowerCase().includes(q) ||
          l.category.toLowerCase().includes(q)
        )
      );
    }

    function renderSuggestions(query) {
      const container = document.getElementById('suggestions');
      const searchBox = document.getElementById('searchBox');
      const matches = filterLinks(query);
      currentSuggestions = matches;
      activeIndex = -1;

      if (!query.trim()) {
        container.classList.remove('visible');
        searchBox.classList.add('no-suggestions');
        return;
      }

      let html = '';

      // Google search hint at the top
      html += `
        <div class="search-hint" data-action="google">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span>Search Google for <strong>&quot;${escapeHtml(query)}&quot;</strong></span>
        </div>
      `;

      matches.slice(0, 8).forEach((link, i) => {
        const domain = new URL(link.url).hostname;
        html += `
          <a class="suggestion-item" href="${escapeHtml(link.url)}" data-index="${i}">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
            </svg>
            <span class="title">${escapeHtml(link.title)}</span>
            <span class="url-hint">${escapeHtml(domain)}</span>
            <span class="category">${escapeHtml(link.category)}</span>
          </a>
        `;
      });

      container.innerHTML = html;

      if (html) {
        container.classList.add('visible');
        searchBox.classList.remove('no-suggestions');
      } else {
        container.classList.remove('visible');
        searchBox.classList.add('no-suggestions');
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function googleSearch(query) {
      window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
    }

    function navigateToSuggestion(index) {
      if (index >= 0 && index < currentSuggestions.length) {
        window.location.href = currentSuggestions[index].url;
      }
    }

    // Input handler
    const searchInput = document.getElementById('searchInput');

    searchInput.addEventListener('input', () => {
      renderSuggestions(searchInput.value);
    });

    searchInput.addEventListener('keydown', (e) => {
      const suggestionItems = document.querySelectorAll('.suggestion-item');
      const total = suggestionItems.length;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, total - 1);
        updateActive(suggestionItems);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, -1);
        updateActive(suggestionItems);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIndex >= 0 && activeIndex < total) {
          navigateToSuggestion(activeIndex);
        } else {
          googleSearch(searchInput.value);
        }
      } else if (e.key === 'Escape') {
        document.getElementById('suggestions').classList.remove('visible');
        document.getElementById('searchBox').classList.add('no-suggestions');
        activeIndex = -1;
      }
    });

    function updateActive(items) {
      items.forEach((el, i) => {
        el.classList.toggle('active', i === activeIndex);
      });
      // Update input text to match selected suggestion
      if (activeIndex >= 0 && activeIndex < currentSuggestions.length) {
        searchInput.value = currentSuggestions[activeIndex].title;
      }
    }

    // Click on Google search hint
    document.getElementById('suggestions').addEventListener('click', (e) => {
      const hint = e.target.closest('.search-hint');
      if (hint) {
        googleSearch(searchInput.value);
      }
    });

    // Close suggestions when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrapper')) {
        document.getElementById('suggestions').classList.remove('visible');
        document.getElementById('searchBox').classList.add('no-suggestions');
      }
    });

    // Re-show suggestions on focus
    searchInput.addEventListener('focus', () => {
      if (searchInput.value.trim()) {
        renderSuggestions(searchInput.value);
      }
    });

    // Settings modal
    const modalOverlay = document.getElementById('modalOverlay');

    document.getElementById('settingsBtn').addEventListener('click', () => {
      modalOverlay.classList.add('visible');
    });

    document.getElementById('modalClose').addEventListener('click', () => {
      modalOverlay.classList.remove('visible');
      searchInput.focus();
    });

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) {
        modalOverlay.classList.remove('visible');
        searchInput.focus();
      }
    });

    // Load on page ready
    loadLinks();
    searchInput.focus();
  </script>
</body>
</html>
